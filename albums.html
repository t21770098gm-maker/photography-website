<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Albums - Photography Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <nav class="menu">
                <ul>

                    <li><a href="about.html">About</a></li>

                <div class="albums-header">
                    <h1>Albums</h1>
                    <div class="sort-controls">

                </div>
                <div class="albums-grid" id="albums-grid">
                    <!-- Albums will be loaded here by JavaScript -->

            </div>
        </main>
